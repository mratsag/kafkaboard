spring.application.name=kafkaboard
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}
server.forward-headers-strategy=framework
spring.datasource.url=jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?preferQueryMode=simple
spring.datasource.username=postgres.jwtucgtlouqpgvgexrsh
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=kafkaboard
